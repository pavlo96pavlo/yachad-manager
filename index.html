<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יחד — מרכז ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1b2a;--blue:#1a3a5c;--accent:#c8963e;--gold:#f0c96a;
  --white:#f5f0e8;--gray:#8a9ab0;--light:#f0ebe0;--surface:#111e2e;
  --green:#27500A;--green-bg:#EAF3DE;
  --amber:#633806;--amber-bg:#FAEEDA;
  --muted:#8a9ab0;
}
body{font-family:'Heebo',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* ─── TOPBAR ─── */
.topbar{background:var(--surface);border-bottom:1px solid rgba(200,150,62,0.15);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:16px;font-weight:700;color:var(--white);}
.logo span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--gray);margin-top:1px;}

/* ─── TABS ─── */
.tabs{display:flex;gap:0;padding:0 28px;background:var(--surface);border-bottom:1px solid rgba(200,150,62,0.15);}
.tab{font-size:13px;padding:12px 20px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px;transition:color 0.15s;}
.tab.active{color:var(--white);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--white);}

/* ─── MAIN ─── */
.main{padding:28px;max-width:1100px;}
.panel{display:none;}.panel.active{display:block;}

/* ─── STATS ─── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid rgba(200,150,62,0.1);border-radius:8px;padding:16px 18px;}
.stat-num{font-size:28px;font-weight:700;line-height:1;}
.stat-label{font-size:12px;color:var(--gray);margin-top:4px;}

/* ─── CONTROLS ─── */
.controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.controls select,.controls input[type=text]{font-size:13px;padding:7px 12px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:var(--surface);color:var(--white);outline:none;}
.controls select:focus,.controls input[type=text]:focus{border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-family:'Heebo',sans-serif;padding:7px 16px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--white);cursor:pointer;transition:background 0.15s;}
.btn:hover{background:rgba(255,255,255,0.07);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--navy);font-weight:700;}
.btn-primary:hover{background:var(--gold);border-color:var(--gold);}

/* ─── SECTION HDR ─── */
.sec-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);padding:6px 0 8px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:10px;margin-top:20px;}
.sec-hdr:first-child{margin-top:0;}

/* ─── TASK CARDS ─── */
.task-list{display:flex;flex-direction:column;gap:8px;}
.task-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 18px;transition:border-color 0.15s;}
.task-card:hover{border-color:rgba(200,150,62,0.3);}
.task-top{display:flex;align-items:flex-start;gap:14px;}
.task-main{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px;}
.task-name.done{text-decoration:line-through;color:var(--gray);}
.task-desc{font-size:12px;color:var(--gray);line-height:1.5;}
.task-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.badge{font-size:11px;padding:2px 9px;border-radius:5px;font-weight:600;}
.bc-admin{background:#E6F1FB;color:#0C447C;}
.bc-platforms{background:#EAF3DE;color:#27500A;}
.bc-content{background:#FAEEDA;color:#633806;}
.bc-influencers{background:#EEEDFE;color:#3C3489;}
.bc-admin_tasks{background:#FAECE7;color:#712B13;}
.bs-done{background:#EAF3DE;color:#27500A;}
.bs-active{background:#FAEEDA;color:#633806;}
.bs-pending{background:rgba(255,255,255,0.08);color:var(--gray);}
.meta-item{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:4px;}
.task-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:16px;transition:all 0.15s;}
.icon-btn:hover{background:rgba(255,255,255,0.07);color:var(--white);}
.icon-btn.danger:hover{background:rgba(192,57,43,0.2);color:#e74c3c;border-color:rgba(192,57,43,0.4);}

/* ─── CALENDAR ─── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav-title{font-size:16px;font-weight:700;color:var(--white);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-hdr{font-size:11px;text-align:center;color:var(--gray);padding:6px 0;font-weight:600;}
.cal-day{min-height:90px;background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px;cursor:pointer;transition:border-color 0.15s;}
.cal-day:hover{border-color:rgba(200,150,62,0.3);}
.cal-day.other{opacity:0.35;}
.cal-day.today{border-color:var(--accent);}
.cal-day-num{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;}
.cal-day.today .cal-day-num{color:var(--accent);}
.cal-post{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.p-tiktok{background:#1a1a2e;color:#a8b4ff;}
.p-instagram{background:#4a1060;color:#e8a0f0;}
.p-facebook{background:#0a2a5e;color:#7ab3f7;}
.p-linkedin{background:#042c53;color:#6ab4f5;}

/* ─── GANTT ─── */
.gantt-wrap{overflow-x:auto;}
.gantt-table{width:100%;border-collapse:collapse;min-width:580px;}
.gantt-table th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);font-weight:600;padding:10px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.08);}
.gantt-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;vertical-align:middle;}
.gantt-table tr:hover td{background:rgba(255,255,255,0.02);}
.bar-bg{background:rgba(255,255,255,0.06);border-radius:4px;height:16px;position:relative;overflow:hidden;}
.bar{height:100%;border-radius:4px;position:absolute;right:0;min-width:10px;}
.bar-done{background:#639922;}.bar-active{background:#BA7517;}.bar-pending{background:#444;}

/* ─── MODAL ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#141f2e;border:1px solid rgba(200,150,62,0.25);border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--white);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--gray);margin-bottom:5px;letter-spacing:0.5px;}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:9px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:var(--surface);color:var(--white);font-family:'Heebo',sans-serif;outline:none;}
.fg input:focus,.fg select,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:65px;line-height:1.5;}
.fg select option{background:#141f2e;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* ─── PLATFORM BADGES ─── */
.plat-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.plat-badge{font-size:12px;padding:5px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);color:var(--gray);font-weight:600;transition:all 0.15s;}
.pb-tiktok.sel{background:#1a1a2e;color:#a8b4ff;border-color:#a8b4ff;}
.pb-instagram.sel{background:#4a1060;color:#e8a0f0;border-color:#e8a0f0;}
.pb-facebook.sel{background:#0a2a5e;color:#7ab3f7;border-color:#7ab3f7;}
.pb-linkedin.sel{background:#042c53;color:#6ab4f5;border-color:#6ab4f5;}

.empty{text-align:center;padding:48px 16px;color:var(--gray);}
.overdue{color:#e74c3c !important;}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr;}
  .main{padding:16px;}
  .topbar{padding:12px 16px;}
  .tabs{padding:0 16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">יחד <span>|</span> מרכז ניהול</div>
    <div class="logo-sub">יחד העמותה לחייל הבודד</div>
  </div>
  <div style="font-size:12px;color:var(--gray);">boded.org.il</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tasks')">✓ משימות</div>
  <div class="tab" onclick="switchTab('calendar')">📅 לוח תוכן</div>
  <div class="tab" onclick="switchTab('gantt')">📊 גאנט</div>
</div>

<div class="main">

  <!-- TASKS -->
  <div class="panel active" id="panel-tasks">
    <div class="stats" id="stats"></div>
    <div class="controls">
      <select id="filter-cat" onchange="renderTasks()">
        <option value="">כל הקטגוריות</option>
        <option value="admin">אדמיניסטרציה</option>
        <option value="platforms">פלטפורמות</option>
        <option value="content">תוכן</option>
        <option value="influencers">משפיענים</option>
        <option value="admin_tasks">משימות שוטפות</option>
      </select>
      <select id="filter-status" onchange="renderTasks()">
        <option value="">כל הסטטוסים</option>
        <option value="done">הושלם</option>
        <option value="active">בתהליך</option>
        <option value="pending">ממתין</option>
      </select>
      <input type="text" id="search" placeholder="חיפוש..." oninput="renderTasks()" style="width:160px"/>
      <button class="btn btn-primary" style="margin-right:auto" onclick="openTaskModal()">+ משימה חדשה</button>
    </div>
    <div class="task-list" id="task-list"></div>
  </div>

  <!-- CALENDAR -->
  <div class="panel" id="panel-calendar">
    <div class="controls">
      <button class="btn btn-primary" style="margin-right:auto" onclick="openPostModal()">+ פוסט חדש</button>
    </div>
    <div class="cal-nav">
      <button class="btn" onclick="changeMonth(-1)">→</button>
      <div class="cal-nav-title" id="cal-title"></div>
      <button class="btn" onclick="changeMonth(1)">←</button>
    </div>
    <div class="cal-grid" id="cal-headers"></div>
    <div class="cal-grid" id="cal-grid" style="margin-top:4px"></div>
  </div>

  <!-- GANTT -->
  <div class="panel" id="panel-gantt">
    <div class="controls">
      <button class="btn btn-primary" style="margin-right:auto" onclick="openTaskModal()">+ משימה חדשה</button>
    </div>
    <div class="gantt-wrap">
      <table class="gantt-table">
        <thead>
          <tr>
            <th style="width:30%">משימה</th>
            <th style="width:12%">אחראי</th>
            <th style="width:12%">סטטוס</th>
            <th style="width:12%">תאריך יעד</th>
            <th>התקדמות</th>
          </tr>
        </thead>
        <tbody id="gantt-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal" onclick="closeBg(event,'task-modal')">
  <div class="modal">
    <h3 id="task-modal-title">משימה חדשה</h3>
    <div class="fg"><label>שם המשימה *</label><input type="text" id="tf-name" placeholder="תיאור קצר..."/></div>
    <div class="fg"><label>פירוט</label><textarea id="tf-desc" placeholder="הסבר נוסף..."></textarea></div>
    <div class="form-row">
      <div class="fg"><label>קטגוריה</label>
        <select id="tf-cat">
          <option value="admin">אדמיניסטרציה</option>
          <option value="platforms">פלטפורמות</option>
          <option value="content">תוכן</option>
          <option value="influencers">משפיענים</option>
          <option value="admin_tasks">משימות שוטפות</option>
        </select>
      </div>
      <div class="fg"><label>סטטוס</label>
        <select id="tf-status">
          <option value="pending">ממתין</option>
          <option value="active">בתהליך</option>
          <option value="done">הושלם</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg"><label>אחראי</label><input type="text" id="tf-owner" placeholder="פבל / מור..."/></div>
      <div class="fg"><label>תאריך יעד</label><input type="date" id="tf-date"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('task-modal')">ביטול</button>
      <button class="btn btn-primary" onclick="saveTask()">שמור</button>
    </div>
  </div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="post-modal" onclick="closeBg(event,'post-modal')">
  <div class="modal">
    <h3 id="post-modal-title">פוסט חדש</h3>
    <div class="fg"><label>כותרת / תיאור *</label><input type="text" id="pf-name" placeholder="על מה הפוסט?"/></div>
    <div class="form-row">
      <div class="fg"><label>תאריך פרסום</label><input type="date" id="pf-date"/></div>
      <div class="fg"><label>סוג תוכן</label>
        <select id="pf-type">
          <option>גיוס תורמים</option>
          <option>פנייה לחיילים</option>
          <option>תיעוד אירוע</option>
          <option>מאחורי הקלעים</option>
          <option>גיוס מתנדבים</option>
          <option>תוכן רב-לשוני</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>פלטפורמות</label>
      <div class="plat-badges">
        <span class="plat-badge pb-tiktok" onclick="togglePlat('tiktok')">TikTok</span>
        <span class="plat-badge pb-instagram" onclick="togglePlat('instagram')">אינסטגרם</span>
        <span class="plat-badge pb-facebook" onclick="togglePlat('facebook')">פייסבוק</span>
        <span class="plat-badge pb-linkedin" onclick="togglePlat('linkedin')">לינקדאין</span>
      </div>
    </div>
    <div class="form-row">
      <div class="fg"><label>אחראי</label><input type="text" id="pf-owner" placeholder="פבל..."/></div>
      <div class="fg"><label>סטטוס</label>
        <select id="pf-status">
          <option value="pending">טיוטה</option>
          <option value="active">מוכן לפרסום</option>
          <option value="done">פורסם</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('post-modal')">ביטול</button>
      <button class="btn btn-primary" onclick="savePost()">שמור</button>
    </div>
  </div>
</div>

<script>
const CAT={admin:'אדמיניסטרציה',platforms:'פלטפורמות',content:'תוכן',influencers:'משפיענים',admin_tasks:'משימות שוטפות'};
const STATUS={done:'הושלם',active:'בתהליך',pending:'ממתין'};
const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const DAYS=['א','ב','ג','ד','ה','ו','ש'];
const TASK_KEY='yachad_tasks_v4';
const POST_KEY='yachad_posts_v2';

const DEFAULT_TASKS=[
  {id:1,name:'תיקון שם העמותה',desc:'שינוי ל"יחד העמותה לחייל הבודד"',cat:'admin',status:'pending',owner:'צוות',date:''},
  {id:2,name:'עדכון מספר חיילים ל-7,000',desc:'עדכון באתר ובפרסומים',cat:'admin',status:'pending',owner:'פבל',date:''},
  {id:3,name:'הרשאות פייסבוק',desc:'גישת ניהול לפבל — בוצע',cat:'admin',status:'done',owner:'בוצע',date:''},
  {id:4,name:'סיסמאות אינסטגרם',desc:'מור מעבירה לפבל',cat:'admin',status:'active',owner:'מור',date:''},
  {id:5,name:'מייל רשמי של העמותה',desc:'לצורך פתיחת הפלטפורמות',cat:'admin',status:'active',owner:'צוות',date:''},
  {id:6,name:'פתיחת חשבון TikTok',desc:'הקמה וניהול ראשוני',cat:'platforms',status:'pending',owner:'פבל',date:''},
  {id:7,name:'הקמת עמוד לינקדאין',desc:'עמוד ארגוני מקצועי',cat:'platforms',status:'pending',owner:'פבל',date:''},
  {id:8,name:'רשימת משפיענים (עד 10)',desc:'לאישור הנהלת העמותה',cat:'influencers',status:'active',owner:'פבל',date:''},
  {id:9,name:'פנייה לפוליטיקאים',desc:'ליברמן, אדלשטיין ואחרים',cat:'influencers',status:'pending',owner:'פבל',date:''},
  {id:10,name:'2 סרטונים שבועיים',desc:'ריאלז/טיקטוקים לפרסום שוטף',cat:'content',status:'active',owner:'פבל',date:''},
];

let tasks=[], posts=[], editingTaskId=null, editingPostId=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let selectedPlats=[];

function loadData(){
  try{ tasks=JSON.parse(localStorage.getItem(TASK_KEY))||DEFAULT_TASKS; }catch{ tasks=DEFAULT_TASKS; }
  try{ posts=JSON.parse(localStorage.getItem(POST_KEY))||[]; }catch{ posts=[]; }
}
function saveTasks(){ localStorage.setItem(TASK_KEY,JSON.stringify(tasks)); }
function savePosts(){ localStorage.setItem(POST_KEY,JSON.stringify(posts)); }

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tasks','calendar','gantt'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='calendar')renderCalendar();
  if(id==='gantt')renderGantt();
}

/* ─── TASKS ─── */
function renderStats(){
  const tot=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const act=tasks.filter(t=>t.status==='active').length,pend=tasks.filter(t=>t.status==='pending').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num">${tot}</div><div class="stat-label">סה"כ משימות</div></div>
    <div class="stat"><div class="stat-num" style="color:#97C459">${done}</div><div class="stat-label">הושלמו</div></div>
    <div class="stat"><div class="stat-num" style="color:#EF9F27">${act}</div><div class="stat-label">בתהליך</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--gray)">${pend}</div><div class="stat-label">ממתינות</div></div>`;
}

function renderTasks(){
  renderStats();
  const cf=document.getElementById('filter-cat').value;
  const sf=document.getElementById('filter-status').value;
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=tasks.filter(t=>{
    if(cf&&t.cat!==cf)return false;
    if(sf&&t.status!==sf)return false;
    if(q&&!t.name.toLowerCase().includes(q)&&!(t.desc||'').toLowerCase().includes(q))return false;
    return true;
  });
  const groups={};
  filtered.forEach(t=>{ if(!groups[t.cat])groups[t.cat]=[]; groups[t.cat].push(t); });
  const el=document.getElementById('task-list');
  if(!filtered.length){ el.innerHTML='<div class="empty">אין משימות תואמות</div>'; return; }
  let html='';
  Object.entries(groups).forEach(([cat,ts])=>{
    html+=`<div class="sec-hdr">${CAT[cat]||cat}</div>`;
    ts.forEach(t=>{
      const over=t.date&&new Date(t.date)<new Date()&&t.status!=='done';
      html+=`<div class="task-card"><div class="task-top">
        <div class="task-main">
          <div class="task-name ${t.status==='done'?'done':''}">${t.name}</div>
          ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
          <div class="task-meta">
            <span class="badge bc-${t.cat}">${CAT[t.cat]}</span>
            <span class="badge bs-${t.status}">${STATUS[t.status]}</span>
            ${t.owner?`<span class="meta-item">👤 ${t.owner}</span>`:''}
            ${t.date?`<span class="meta-item ${over?'overdue':''}">📅 ${fmtDate(t.date)}${over?' — באיחור':''}</span>`:''}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="cycleStatus(${t.id})" title="שנה סטטוס">↻</button>
          <button class="icon-btn" onclick="editTask(${t.id})" title="ערוך">✎</button>
          <button class="icon-btn danger" onclick="deleteTask(${t.id})" title="מחק">✕</button>
        </div>
      </div></div>`;
    });
  });
  el.innerHTML=html;
}

function fmtDate(d){ if(!d)return''; const[y,m,day]=d.split('-'); return`${day}/${m}/${y}`; }

function cycleStatus(id){
  const t=tasks.find(t=>t.id===id); if(!t)return;
  const o=['pending','active','done'];
  t.status=o[(o.indexOf(t.status)+1)%3];
  saveTasks(); renderTasks(); if(document.getElementById('panel-gantt').classList.contains('active'))renderGantt();
}
function deleteTask(id){ if(!confirm('למחוק את המשימה?'))return; tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderTasks(); }

function openTaskModal(){
  editingTaskId=null;
  document.getElementById('task-modal-title').textContent='משימה חדשה';
  ['tf-name','tf-desc','tf-owner','tf-date'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tf-cat').value='admin';
  document.getElementById('tf-status').value='pending';
  document.getElementById('task-modal').classList.add('open');
}
function editTask(id){
  const t=tasks.find(t=>t.id===id); if(!t)return; editingTaskId=id;
  document.getElementById('task-modal-title').textContent='עריכת משימה';
  document.getElementById('tf-name').value=t.name;
  document.getElementById('tf-desc').value=t.desc||'';
  document.getElementById('tf-cat').value=t.cat;
  document.getElementById('tf-status').value=t.status;
  document.getElementById('tf-owner').value=t.owner||'';
  document.getElementById('tf-date').value=t.date||'';
  document.getElementById('task-modal').classList.add('open');
}
function saveTask(){
  const name=document.getElementById('tf-name').value.trim(); if(!name)return;
  const task={id:editingTaskId||Date.now(),name,
    desc:document.getElementById('tf-desc').value.trim(),
    cat:document.getElementById('tf-cat').value,
    status:document.getElementById('tf-status').value,
    owner:document.getElementById('tf-owner').value.trim(),
    date:document.getElementById('tf-date').value};
  if(editingTaskId) tasks=tasks.map(t=>t.id===editingTaskId?task:t); else tasks.push(task);
  saveTasks(); closeModal('task-modal'); renderTasks();
}

/* ─── CALENDAR ─── */
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${MONTHS[calMonth]} ${calYear}`;
  document.getElementById('cal-headers').innerHTML=DAYS.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1);
  const startDay=(first.getDay()+1)%7;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date(); let cells='';
  for(let i=0;i<startDay;i++){
    cells+=`<div class="cal-day other"><div class="cal-day-num">${prevDays-startDay+1+i}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dayPosts=posts.filter(p=>p.date===ds);
    const ph=dayPosts.map(p=>`<div class="cal-post p-${(p.platforms||[])[0]||'tiktok'}" onclick="editPost(${p.id})" title="${p.name}">${p.name}</div>`).join('');
    cells+=`<div class="cal-day ${isToday?'today':''}" onclick="openPostOnDay('${ds}')"><div class="cal-day-num">${d}</div>${ph}</div>`;
  }
  const rem=(7-(startDay+daysInMonth)%7)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="cal-day other"><div class="cal-day-num">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=cells;
}

function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function openPostOnDay(date){
  openPostModal(); document.getElementById('pf-date').value=date;
}

function togglePlat(p){
  const idx=selectedPlats.indexOf(p);
  if(idx>-1) selectedPlats.splice(idx,1); else selectedPlats.push(p);
  ['tiktok','instagram','facebook','linkedin'].forEach(pl=>{
    const el=document.querySelector('.pb-'+pl);
    el.className='plat-badge pb-'+pl+(selectedPlats.includes(pl)?' sel':'');
  });
}

function openPostModal(){
  editingPostId=null; selectedPlats=[];
  document.getElementById('post-modal-title').textContent='פוסט חדש';
  ['pf-name','pf-date','pf-owner'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pf-type').value='גיוס תורמים';
  document.getElementById('pf-status').value='pending';
  ['tiktok','instagram','facebook','linkedin'].forEach(p=>{
    document.querySelector('.pb-'+p).className='plat-badge pb-'+p;
  });
  document.getElementById('post-modal').classList.add('open');
}
function editPost(id){
  const p=posts.find(p=>p.id===id); if(!p)return; editingPostId=id;
  selectedPlats=[...(p.platforms||[])];
  document.getElementById('post-modal-title').textContent='עריכת פוסט';
  document.getElementById('pf-name').value=p.name;
  document.getElementById('pf-date').value=p.date||'';
  document.getElementById('pf-type').value=p.type||'גיוס תורמים';
  document.getElementById('pf-owner').value=p.owner||'';
  document.getElementById('pf-status').value=p.status||'pending';
  ['tiktok','instagram','facebook','linkedin'].forEach(pl=>{
    document.querySelector('.pb-'+pl).className='plat-badge pb-'+pl+(selectedPlats.includes(pl)?' sel':'');
  });
  document.getElementById('post-modal').classList.add('open');
}
function savePost(){
  const name=document.getElementById('pf-name').value.trim(); if(!name)return;
  const post={id:editingPostId||Date.now(),name,
    date:document.getElementById('pf-date').value,
    type:document.getElementById('pf-type').value,
    platforms:[...selectedPlats],
    owner:document.getElementById('pf-owner').value.trim(),
    status:document.getElementById('pf-status').value};
  if(editingPostId) posts=posts.map(p=>p.id===editingPostId?post:p); else posts.push(post);
  savePosts(); closeModal('post-modal'); renderCalendar();
}

/* ─── GANTT ─── */
function renderGantt(){
  const sorted=[...tasks].sort((a,b)=>{
    if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1;
    return new Date(a.date)-new Date(b.date);
  });
  const hasDates=sorted.filter(t=>t.date);
  const minD=hasDates.length?new Date(hasDates[0].date):new Date();
  const maxD=hasDates.length?new Date(hasDates[hasDates.length-1].date):new Date();
  const range=Math.max(1,(maxD-minD)/(864e5));
  const pct=d=>{ if(!d)return null; return Math.min(90,Math.max(0,Math.round((new Date(d)-minD)/(864e5)/range*90))); };
  const rows=[...hasDates,...sorted.filter(t=>!t.date)].map(t=>{
    const p=pct(t.date);
    const bar=p!==null
      ?`<div class="bar-bg"><div class="bar bar-${t.status}" style="right:${p}%;width:${Math.max(10,100-p)}%"></div></div>`
      :`<div class="bar-bg"><div class="bar bar-${t.status}" style="right:0;width:35%"></div></div>`;
    return`<tr>
      <td style="font-weight:600;color:var(--white)">${t.name}</td>
      <td style="color:var(--gray)">${t.owner||'—'}</td>
      <td><span class="badge bs-${t.status}">${STATUS[t.status]}</span></td>
      <td style="color:var(--gray)">${t.date?fmtDate(t.date):'—'}</td>
      <td>${bar}</td>
    </tr>`;
  }).join('');
  document.getElementById('gantt-body').innerHTML=rows||'<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--gray)">אין משימות</td></tr>';
}

/* ─── UTILS ─── */
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeBg(e,id){ if(e.target.id===id)closeModal(id); }

loadData(); renderTasks();
</script>
